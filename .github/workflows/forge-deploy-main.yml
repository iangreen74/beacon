name: Deploy main
on:
  push:
    branches: [main]
    paths: ['./**']
  workflow_dispatch:
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: main
  ECS_CLUSTER: main-cluster
  ECS_SERVICE: main
permissions:
  id-token: write
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::418295677815:role/github-actions-main
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          IMG="418295677815.dkr.ecr.us-east-1.amazonaws.com/main"
          docker build -f Dockerfile -t $IMG:${{ github.sha }} -t $IMG:latest .
          docker push $IMG:${{ github.sha }} && docker push $IMG:latest
      - name: Deploy to ECS
        env:
          AWS_PAGER: ""
        run: |
          aws ecs update-service --cluster main-cluster --service main --force-new-deployment --region us-east-1
          aws ecs wait services-stable --cluster main-cluster --services main --region us-east-1
