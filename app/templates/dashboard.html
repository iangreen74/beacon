<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --card: #f5f5f5; --border: #e0e0e0; --accent: #3b82f6; }
        [data-theme="dark"] { --bg: #1a1a1a; --text: #ffffff; --card: #2a2a2a; --border: #404040; --accent: #60a5fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: all 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { opacity: 0.9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .pulse-item { padding: 12px; border-bottom: 1px solid var(--border); }
        .pulse-item:last-child { border-bottom: none; }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="header">
            <h1>Beacon Dashboard</h1>
            <button @click="toggleTheme" class="btn">Toggle Theme</button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Submit Pulse</h2>
                <div>
                    <label>Mood (1-5):</label>
                    <input v-model.number="pulseForm.mood" type="number" min="1" max="5" style="width: 100%; padding: 8px; margin: 10px 0;">
                    <label>Energy (1-5):</label>
                    <input v-model.number="pulseForm.energy" type="number" min="1" max="5" style="width: 100%; padding: 8px; margin: 10px 0;">
                    <label>Notes:</label>
                    <textarea v-model="pulseForm.notes" style="width: 100%; padding: 8px; margin: 10px 0; min-height: 80px;"></textarea>
                    <button @click="submitPulse" class="btn" :disabled="loading">Submit Pulse</button>
                </div>
            </div>

            <div class="card">
                <h2>Recent Pulses</h2>
                <div v-if="loading" class="loading">Loading...</div>
                <div v-else-if="pulses.length === 0" style="text-align: center; padding: 20px; color: #999;">No pulses yet</div>
                <div v-else>
                    <div v-for="pulse in pulses" :key="pulse.id" class="pulse-item">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong>{{ formatDate(pulse.created_at) }}</strong>
                            <span>Mood: {{ pulse.mood }} | Energy: {{ pulse.energy }}</span>
                        </div>
                        <div v-if="pulse.notes" style="color: #666; font-size: 14px;">{{ pulse.notes }}</div>
                    </div>
                </div>
                <button @click="loadPulses" class="btn" style="margin-top: 15px;">Refresh</button>
            </div>

            <div class="card">
                <h2>Team Trends</h2>
                <div v-if="trends">
                    <p><strong>Health Trend:</strong> {{ trends.health_trend }}</p>
                    <p><strong>Blockers:</strong> {{ trends.blockers }}</p>
                </div>
                <button @click="loadTrends" class="btn" style="margin-top: 15px;">Analyze Trends</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    pulses: [],
                    trends: null,
                    loading: false,
                    pulseForm: { mood: 3, energy: 3, notes: '' }
                };
            },
            mounted() {
                this.loadPulses();
            },
            methods: {
                async submitPulse() {
                    if (this.pulseForm.mood < 1 || this.pulseForm.mood > 5 || this.pulseForm.energy < 1 || this.pulseForm.energy > 5) {
                        alert('Mood and Energy must be between 1 and 5');
                        return;
                    }
                    this.loading = true;
                    try {
                        const response = await fetch('/api/pulses', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.pulseForm)
                        });
                        if (!response.ok) throw new Error('Failed to submit pulse');
                        alert('Pulse submitted successfully!');
                        this.pulseForm = { mood: 3, energy: 3, notes: '' };
                        await this.loadPulses();
                    } catch (error) {
                        alert('Error: ' + error.message);
                    } finally {
                        this.loading = false;
                    }
                },
                async loadPulses() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/pulses');
                        if (!response.ok) throw new Error('Failed to load pulses');
                        this.pulses = await response.json();
                    } catch (error) {
                        console.error('Error loading pulses:', error);
                    } finally {
                        this.loading = false;
                    }
                },
                async loadTrends() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/trends/analysis');
                        if (!response.ok) throw new Error('Failed to load trends');
                        this.trends = await response.json();
                    } catch (error) {
                        alert('Error: ' + error.message);
                    } finally {
                        this.loading = false;
                    }
                },
                toggleTheme() {
                    const html = document.documentElement;
                    const currentTheme = html.getAttribute('data-theme');
                    html.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
                },
                formatDate(dateString) {
                    return new Date(dateString).toLocaleString();
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
